[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api requests to the Render backend to dodge CORS
[[redirects]]
  from = "/api/*"
  to = "https://chemcom-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Fallback all other routes to index.html for React Router SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
